name: dbt run

on:
  schedule:
    - cron: '0 16 * * *'  # 毎日UTC 16:00（日本時間1:00）に実行
  workflow_dispatch:        # 手動実行（リラン）も可能

jobs:
  dbt-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: Write GCP credentials file
        run: echo '${{ secrets.GCP_SA_KEY }}' > $HOME/gcp-key.json

      - name: Set up dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<'PROFILE'
          dbt_project:
            outputs:
              dev:
                type: bigquery
                method: service-account
                keyfile: KEYFILE_PATH
                project: mizuki-analytics
                dataset: dbt_mart
                threads: 1
                job_execution_timeout_seconds: 300
                location: US
            target: dev
          PROFILE
          sed -i "s|KEYFILE_PATH|$HOME/gcp-key.json|" ~/.dbt/profiles.yml

      - name: dbt run
        working-directory: dbt_project
        run: dbt run
        timeout-minutes: 30

      - name: dbt test
        working-directory: dbt_project
        run: dbt test
        timeout-minutes: 10
